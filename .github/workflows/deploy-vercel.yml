# main へのプッシュ時にビルド＋Vercel 本番デプロイを実行
# norm-changes と同様の構成（失敗時は gh run watch で検知）
name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Verify Secrets
        run: |
          if [ -z "$VERCEL_ORG_ID" ]; then echo "::error::VERCEL_ORG_ID is empty"; exit 1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "::error::VERCEL_PROJECT_ID is empty"; exit 1; fi
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::VERCEL_TOKEN is empty"; exit 1; fi
          if [ -z "$DATABASE_URL" ]; then echo "::error::DATABASE_URL is empty"; exit 1; fi
          if [ -z "$VITE_SUPABASE_URL" ]; then echo "::error::VITE_SUPABASE_URL is empty"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "::error::SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1; fi
          echo "All secrets present!"

      - name: Remove .git to bypass Vercel check
        run: rm -rf .git

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_SCHEMA: yabai_travel
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_APP_SECRET: ${{ secrets.RAKUTEN_APP_SECRET }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          VITE_RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Set Vercel environment variables
        run: |
          echo "${{ secrets.RAKUTEN_APP_ID }}" | npx vercel env add RAKUTEN_APP_ID production --token=$VERCEL_TOKEN --force 2>/dev/null || true
          echo "${{ secrets.RAKUTEN_AFFILIATE_ID }}" | npx vercel env add RAKUTEN_AFFILIATE_ID production --token=$VERCEL_TOKEN --force 2>/dev/null || true
          echo "${{ secrets.RAKUTEN_APP_SECRET }}" | npx vercel env add RAKUTEN_ACCESS_KEY production --token=$VERCEL_TOKEN --force 2>/dev/null || true

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
