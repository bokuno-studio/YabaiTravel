# staging へのプッシュ時にビルド＋Vercel プレビューデプロイを実行
# 失敗時は gh run watch で検知できる（Vercel の自動デプロイとは別）
name: Staging Deploy to Vercel

on:
  push:
    branches:
      - staging

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Security gate — npm audit
        run: |
          echo "── npm audit (critical) ──"
          npm audit --audit-level=critical || {
            echo "::error::npm audit found critical vulnerabilities — aborting deploy"
            exit 1
          }
          echo "── npm audit (high — warning only) ──"
          npm audit --audit-level=high || {
            echo "::warning::npm audit found high vulnerabilities (non-blocking)"
          }

      - name: Verify Secrets
        run: |
          if [ -z "$VERCEL_ORG_ID" ]; then echo "::error::VERCEL_ORG_ID is empty"; exit 1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "::error::VERCEL_PROJECT_ID is empty"; exit 1; fi
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::VERCEL_TOKEN is empty"; exit 1; fi
          if [ -z "$DATABASE_URL" ]; then echo "::error::DATABASE_URL is empty"; exit 1; fi
          if [ -z "$VITE_SUPABASE_URL" ]; then echo "::error::VITE_SUPABASE_URL is empty"; exit 1; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "::error::SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1; fi
          echo "All secrets present!"

      - name: Remove .git to bypass Vercel check
        run: rm -rf .git

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SCHEMA: yabai_travel_staging
          VITE_SUPABASE_SCHEMA: yabai_travel_staging
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npx vercel build --token=$VERCEL_TOKEN

      - name: Security gate — check build output
        run: |
          echo "── Mixed content check ──"
          MIXED=$(grep -r 'http://' dist/ --include='*.html' --include='*.js' \
            | grep -v 'http://www.w3.org' \
            | grep -v 'http://localhost' \
            | grep -v '//schema.org' \
            | grep -v 'sourceMappingURL' \
            || true)
          if [ -n "$MIXED" ]; then
            echo "::error::Mixed content (http://) found in build output:"
            echo "$MIXED"
            exit 1
          else
            echo "  PASS: No mixed content found"
          fi

          echo ""
          echo "── Server-side key exposure check ──"
          SENSITIVE_PATTERNS="sk_live sq0 service_role AIzaSy"
          KEY_FAIL=0
          for PATTERN in $SENSITIVE_PATTERNS; do
            if grep -r "$PATTERN" dist/ --include='*.html' --include='*.js' 2>/dev/null; then
              echo "  FAIL: '$PATTERN' found in build output!"
              KEY_FAIL=1
            fi
          done
          if [ "$KEY_FAIL" -eq 1 ]; then
            echo "::error::Sensitive keys detected in build output — aborting deploy"
            exit 1
          else
            echo "  PASS: No sensitive keys found in build output"
          fi

      - name: Deploy to Vercel (Preview)
        run: npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
