# staging へのプッシュ時にビルドを実行（DATABASE_URL は GitHub Secrets から取得）
# 失敗時は GitHub のコミットに ❌ が付き、メール通知される場合あり
name: Staging Build Check

on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (DATABASE_URL 必須)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo ""
            echo "::error::*** デプロイ失敗: DATABASE_URL が未設定 ***"
            echo ""
            echo "GitHub に DATABASE_URL を追加してください:"
            echo "  Repository → Settings → Secrets and variables → Actions"
            echo "  New repository secret → Name: DATABASE_URL"
            echo "  値: Supabase Dashboard → Project Settings → Database → Connection string"
            echo ""
            echo "Vercel にも同様に設定してください:"
            echo "  Project Settings → Environment Variables → DATABASE_URL"
            echo ""
            exit 1
          fi
          npm run build
