# 旧統合ワークフロー（手動トリガーのみ。定期実行は enrich-events.yml + enrich-categories.yml に分離）
name: Enrich Events (Legacy)

on:
  workflow_dispatch:
    inputs:
      schema:
        description: '対象スキーマ（デフォルト: yabai_travel）'
        required: false
        default: 'yabai_travel'
      enrich_limit:
        description: 'enrich の最大件数（デフォルト: 無制限）'
        required: false
        default: ''
      event_id:
        description: '特定イベントIDを再enrich（洗替）する場合に指定'
        required: false
        default: ''
  # schedule disabled — replaced by enrich-events.yml + enrich-categories.yml

permissions:
  issues: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 詳細・ロジ収集
        run: |
          if [ -n "$EVENT_ID" ]; then
            echo "=== 特定イベント再enrich: $EVENT_ID ==="
            node scripts/crawl/enrich-detail.js --event-id "$EVENT_ID"
            node scripts/crawl/enrich-logi.js --event-id "$EVENT_ID"
          else
            ARGS=""
            if [ -n "$ENRICH_LIMIT" ]; then ARGS="--once --concurrency $ENRICH_LIMIT"; fi
            node scripts/crawl/orchestrator.js $ARGS
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SCHEMA: ${{ github.event.inputs.schema || 'yabai_travel' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_DIRECTIONS_API_KEY: ${{ secrets.GOOGLE_DIRECTIONS_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ENRICH_LIMIT: ${{ github.event.inputs.enrich_limit }}
          EVENT_ID: ${{ github.event.inputs.event_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
