# ②-B カテゴリ詳細収集
name: Enrich Categories (②-B)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'バッチサイズ（処理件数上限）'
        required: false
        default: '50'
  schedule:
    - cron: '30 */4 * * *'  # 4時間おき（UTC 0:30,4:30,8:30,...）

permissions:
  issues: write

jobs:
  enrich-categories:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: カテゴリ詳細収集（Batch API）
        run: node scripts/crawl/enrich-category-detail.js --batch --limit ${{ github.event.inputs.limit || '50' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SCHEMA: yabai_travel
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
