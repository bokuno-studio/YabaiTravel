# Monthly Crew membership billing via Square Invoices
name: Square Monthly Billing

on:
  workflow_dispatch: {}
  schedule:
    # Run on the 1st of every month at 09:00 JST (00:00 UTC)
    - cron: '0 0 1 * *'

jobs:
  billing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run monthly billing
        run: node scripts/square-monthly-billing.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
