name: Dev.to Article Publishing

on:
  push:
    paths:
      - 'content/blog/publish/devto/**'
  workflow_dispatch:
    inputs:
      filename:
        description: 'Article filename to publish (optional, otherwise publishes all ready articles)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish articles to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          # Write env file for script
          echo "DEVTO_API_KEY=$DEVTO_API_KEY" > .env.local

          # If filename provided, publish that specific article
          if [ -n "${{ github.event.inputs.filename }}" ]; then
            node scripts/devto-publish.mjs publish "${{ github.event.inputs.filename }}"
          else
            # Otherwise, auto-publish all articles with published: true
            echo "📅 Auto-publishing articles from content/blog/publish/devto/..."
            node scripts/devto-publish.mjs publish
          fi

      - name: Commit updated frontmatter
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/blog/publish/devto/
          git commit -m "ci: update dev.to article frontmatter (devto_id)" || true

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
